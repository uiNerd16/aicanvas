name: premium health after deploy

# SUBSCRIBER SAFETY: after every push to main, confirm production is still serving
# the pinned premium. If premium ever goes missing or degraded (e.g. GITHUB_PAT_PREMIUM
# absent in Vercel), this job FAILS and GitHub emails you. It uses only the PUBLIC
# health endpoint and the tracked premium.lock.json — no secrets.

on:
  push:
    branches: [main]

# Never let two runs race; the latest deploy is the one that matters.
concurrency:
  group: premium-health-main
  cancel-in-progress: true

jobs:
  verify-premium-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm production serves the pinned premium
        run: |
          set -euo pipefail
          PIN="$(node -p "require('./premium.lock.json').sha")"
          URL="https://aicanvas.me/api/premium/health"
          echo "Expected pinned premium sha: $PIN"
          echo "Giving the production deploy ~90s to go live..."
          sleep 90
          deadline=$(( SECONDS + 480 ))   # up to 8 more minutes
          last=""
          while (( SECONDS < deadline )); do
            body="$(curl -fsS "$URL" || echo '{}')"
            sha="$(echo "$body" | jq -r '.premiumSha // "null"')"
            deg="$(echo "$body" | jq -r '.degraded // true')"
            cnt="$(echo "$body" | jq -r '.premiumStandaloneCount // 0')"
            last="premiumSha=$sha degraded=$deg count=$cnt"
            echo "health -> $last"
            if [[ "$sha" == "$PIN" && "$deg" == "false" && "$cnt" -gt 0 ]]; then
              echo "OK: production is serving pinned premium ($PIN), degraded:false, $cnt component(s)."
              exit 0
            fi
            sleep 20
          done
          echo "::error title=Premium missing in production::Production is NOT serving the pinned premium ($PIN) [$last]. Paying subscribers may be on a free-only build. Check GITHUB_PAT_PREMIUM in Vercel Production and the latest deploy logs, then roll back if needed."
          exit 1
